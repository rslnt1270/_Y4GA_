# Labels app.kubernetes.io/* preparan migración a EKS sin cambios de código.
# Para EKS: cada service → Deployment + Service + ConfigMap + Secret (ESO).

services:
  postgres:
    image: postgres:16.10-alpine
    container_name: yaga_postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql
      - ./infrastructure/database/migrations:/docker-entrypoint-initdb.d/migrations
    # Sin exposición de puerto al host — solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yaga_user -d yaga_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      app.kubernetes.io/name: "postgres"
      app.kubernetes.io/component: "database"
      app.kubernetes.io/part-of: "yaga"

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: yaga_valkey
    # Valkey: fork BSD 3-Clause de Redis — elimina riesgo de licencia SSPL y CVE-2025-49844
    command: >
      valkey-server
      --requirepass ${VALKEY_PASSWORD}
      --bind 0.0.0.0
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    # Sin exposición de puerto al host — solo accesible dentro de la red Docker
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      app.kubernetes.io/name: "valkey"
      app.kubernetes.io/component: "cache"
      app.kubernetes.io/part-of: "yaga"

  api:
    build: ./app
    container_name: yaga_api
    env_file: .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      app.kubernetes.io/name: "yaga-api"
      app.kubernetes.io/component: "backend"
      app.kubernetes.io/part-of: "yaga"
      app.kubernetes.io/version: "0.5.0"

  nginx-proxy:
    image: owasp/modsecurity-crs:nginx
    container_name: yaga_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/templates/conf.d/default.conf.template:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    labels:
      app.kubernetes.io/name: "nginx-proxy"
      app.kubernetes.io/component: "ingress"
      app.kubernetes.io/part-of: "yaga"

volumes:
  postgres_data:
    labels:
      app.kubernetes.io/part-of: "yaga"
      backup: "required"
