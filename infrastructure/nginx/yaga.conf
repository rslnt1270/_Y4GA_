# Nginx config for y4ga.app — EC2 reverse proxy + static files
# Location: /etc/nginx/conf.d/yaga.conf on EC2

server {
    listen 443 ssl;
    server_name y4ga.app www.y4ga.app;

    ssl_certificate     /etc/ssl/cloudflare/y4ga.app.pem;
    ssl_certificate_key /etc/ssl/cloudflare/y4ga.app.key;

    root /var/www/yaga;
    index index.html;

    # Security Headers — YAGA Project
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=()" always;

    # Juego Poleana — servido directamente desde EC2
    location /poleana/ {
        alias /var/www/yaga/poleana/;
        index index.html;
        try_files $uri $uri/ /poleana/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Redirección corta /poleana → /poleana/
    location = /poleana {
        return 301 /poleana/;
    }

    location /api/v1/poleana/ws/ {
        proxy_pass http://localhost:8000/api/v1/poleana/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600;
    }

    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://localhost:8000/health;
    }

    location /manifest.json {
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache, no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }
}

server {
    listen 80;
    server_name y4ga.app www.y4ga.app;

    location /health {
        proxy_pass http://localhost:8000/health;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
