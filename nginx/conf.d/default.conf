# nginx/conf.d/default.conf — YAGA Backend (EC2 t3.small)
# TLS: Cloudflare Origin Certificate (modo Full Strict en CF dashboard)

# ── Puerto 80: redirigir a HTTPS ──────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Puerto 443: TLS con Cloudflare Origin Certificate ────────────────────────
server {
    listen 443 ssl default_server;
    server_name _;

    # Cloudflare Origin Certificate — CF dashboard → SSL/TLS → Origin Server → Create Certificate
    ssl_certificate     /etc/nginx/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    client_max_body_size 2m;

    # Bloquear acceso directo a docs internos de FastAPI
    location /api/docs         { return 404; }
    location /api/redoc        { return 404; }
    location /api/openapi.json { return 404; }

    # ── Proxy HTTPS → FastAPI :8000 ───────────────────────────────────────────
    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;

        # WebSocket — Poleana /ws/poleana/*
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
