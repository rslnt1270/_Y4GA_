# wrangler.toml — Cloudflare Workers: servidor estático del frontend YAGA
#
# El Worker sirve los archivos de frontend/ bajo /yaga/.
# El backend (FastAPI) vive en EC2 y se accede via /api/*.
# Las rutas y el account_id se configuran en el dashboard de Cloudflare.

name = "y4ga"
compatibility_date = "2025-01-01"

# Servir frontend/ como assets estáticos
[assets]
directory = "./frontend"
not_found_handling = "single-page-application"
